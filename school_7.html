<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アイリスバレエ兵庫 | Ballet Classe</title>
  <meta name="description" content="フランスのエレガントなバレエスタイルを学ぶことができるスタジオです。表現力と正確なテクニックを身につけるため、経験豊富な講師陣が一人ひとりに合わせた指導を行います。無料体験レッスンも随時開催しています。" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            roseSoft: "#fff1f5",
            roseLine: "#f9c7d6",
            roseMain: "#e85d8f",
            roseDeep: "#be2f67"
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-white text-slate-800">
  <header class="border-b border-pink-100 bg-white">
    <div class="mx-auto max-w-5xl px-4 py-5 sm:px-6 lg:px-8">
      <a href="index.html" class="text-sm font-medium text-roseDeep">← バレエ教室検索へ戻る</a>
      <h1 class="mt-3 text-3xl font-semibold text-slate-900 sm:text-4xl">アイリスバレエ兵庫</h1>
      <p class="mt-2 text-sm text-slate-600">兵庫 / パリ・オペラ座 / 対象: キッズ・ジュニア・大人</p>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 py-6 sm:px-6 lg:px-8">
    <img src="https://images.unsplash.com/photo-1518834107812-67b0b7c58434?w=600" alt="アイリスバレエ兵庫" class="h-72 w-full rounded-lg object-cover sm:h-96" />

    <div class="mt-6 grid gap-5">
      <section class="rounded-md border border-pink-100 p-4">
        <h2 class="text-base font-semibold text-slate-900">基本情報</h2>
        <p class="mt-3 text-sm text-slate-600">住所: 兵庫県神戸市中央区三宮町3-4-5</p>
      </section>

      <p class="leading-7 text-slate-700">フランスのエレガントなバレエスタイルを学ぶことができるスタジオです。表現力と正確なテクニックを身につけるため、経験豊富な講師陣が一人ひとりに合わせた指導を行います。無料体験レッスンも随時開催しています。</p>

      <section class="rounded-md border border-pink-100 p-4">
        <h2 class="text-base font-semibold text-slate-900">留学実績</h2>
        <ul class="mt-4 space-y-2 text-sm text-slate-700"><li class="rounded-md border border-pink-100 px-4 py-3"><span class="font-medium">フランス</span><span class="ml-3 text-slate-600">パリ・オペラ座バレエ学校</span></li></ul>
      </section>

      <section class="rounded-md border border-pink-100 p-4">
        <h2 class="text-base font-semibold text-slate-900">コンクール実績</h2>
        <div class="mt-4 overflow-x-auto rounded-md border border-pink-100">
          <table class="w-full min-w-[520px] text-left text-sm">
            <thead class="bg-roseSoft text-roseDeep">
              <tr><th class="px-4 py-3">入賞年</th><th class="px-4 py-3">件数</th><th class="px-4 py-3">コンクール名</th></tr>
            </thead>
            <tbody class="divide-y divide-pink-100"><tr><td class="px-4 py-3 font-medium">2024</td><td class="px-4 py-3">1件</td><td class="px-4 py-3">国際バレエコンクール</td></tr><tr><td class="px-4 py-3 font-medium">2023</td><td class="px-4 py-3">2件</td><td class="px-4 py-3">国内コンクール</td></tr></tbody>
          </table>
        </div>
      </section>

      <section class="rounded-md border border-pink-100 p-4">
        <h2 class="text-base font-semibold text-slate-900">クラス・料金</h2>
        <div class="mt-4"><img src="https://placehold.co/800x600/fff1f5/be2f67?text=Schedule+H" alt="クラス・料金スケジュール" class="h-auto w-full rounded-md object-contain" /></div>
      </section>

      <div><a href="https://example.com/iris" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center rounded-md bg-roseMain px-5 py-3 text-sm font-semibold text-white transition hover:bg-roseDeep">公式サイトを見る</a></div>
    </div>
  </main>

</html>
