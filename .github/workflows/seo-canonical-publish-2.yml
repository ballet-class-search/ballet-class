name: One-time SEO canonical publish retry

on:
  push:
    paths:
      - .github/workflows/seo-canonical-publish-2.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply SEO canonical fixes
        shell: python
        run: |
          from pathlib import Path
          import re
          import xml.etree.ElementTree as ET

          origin = "https://ballet-class-search.com"

          def upsert_head(text, html):
              if html in text:
                  return text
              pos = text.find("<script")
              if pos == -1:
                  pos = text.find("</head>")
              if pos == -1:
                  raise SystemExit("no head insertion point")
              prefix = "" if text[pos - 1:pos] == "\n" else "\n"
              return text[:pos] + prefix + "  " + html + "\n" + text[pos:]

          index = Path("index.html")
          text = index.read_text(encoding="utf-8")
          text = upsert_head(text, '<meta name="robots" content="index,follow" />')
          index.write_text(text, encoding="utf-8")

          for page in sorted(Path(".").glob("school_*.html")):
              num = page.stem.split("_")[-1]
              text = page.read_text(encoding="utf-8")
              text = upsert_head(text, f'<link rel="canonical" href="{origin}/school_{num}.html" />')
              text = upsert_head(text, '<meta name="robots" content="index,follow" />')
              text = text.replace('href="index.html"', 'href="/"')
              page.write_text(text, encoding="utf-8")

          urls = [f"{origin}/"] + [f"{origin}/school_{i}.html" for i in range(1, 14)]
          sitemap = ['<?xml version="1.0" encoding="UTF-8"?>', '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">']
          for url in urls:
              sitemap += ["  <url>", f"    <loc>{url}</loc>", "  </url>"]
          sitemap.append("</urlset>")
          Path("sitemap.xml").write_text("\n".join(sitemap) + "\n", encoding="utf-8")
          Path("robots.txt").write_text("User-agent: *\nAllow: /\n\nSitemap: https://ballet-class-search.com/sitemap.xml\n", encoding="utf-8")

          expected = set(urls)
          found = {loc.text.strip() for loc in ET.parse("sitemap.xml").findall(".//{http://www.sitemaps.org/schemas/sitemap/0.9}loc")}
          if found != expected:
              raise SystemExit(f"sitemap mismatch: {sorted(found ^ expected)}")
          for i in range(1, 14):
              page = Path(f"school_{i}.html")
              if not page.exists():
                  raise SystemExit(f"missing {page}")
              text = page.read_text(encoding="utf-8")
              if f'href="{origin}/school_{i}.html"' not in text or 'content="index,follow"' not in text or "noindex" in text.lower():
                  raise SystemExit(f"bad SEO tags in {page}")
          text = Path("index.html").read_text(encoding="utf-8")
          if 'content="index,follow"' not in text or "noindex" in text.lower():
              raise SystemExit("bad SEO tags in index.html")
          Path(".github/workflows/seo-canonical-publish.yml").unlink(missing_ok=True)
          Path(".github/workflows/seo-canonical-publish-2.yml").unlink(missing_ok=True)
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html school_*.html sitemap.xml robots.txt .github/workflows/seo-canonical-publish.yml .github/workflows/seo-canonical-publish-2.yml
          git commit -m "Fix canonical sitemap SEO signals"
          git push
